<svg xmlns="http://www.w3.org/2000/svg" width="351" height="504" viewBox="0 0 351 504">
  <text id="Дорогие_друзья_Приглашаем_вас_посетить_Центр_Духовного_Возрождения._Это_уникальное_место_в_Лос-_Анджелесе_где_вы_встретите_дружелюбных_людей_всех_возрастов_из_разных_мест_СНГ._У_нас_есть_классы_по_изучению_Библии_для_разных_возрастов_и_для_разных" data-name="Дорогие друзья!

Приглашаем вас посетить Центр 
Духовного Возрождения. Это 
уникальное место в Лос-
Анджелесе, где вы встретите 
дружелюбных людей всех 
возрастов из разных мест СНГ.

У нас есть классы по изучению 
Библии для разных возрастов и 
для разных" transform="translate(1 19)" fill="#313852" font-size="20" font-family="Montserrat-Regular, Montserrat"><tspan x="0" y="0">Дорогие друзья!</tspan><tspan x="0" y="24"></tspan><tspan x="0" y="48">Приглашаем вас посетить Центр </tspan><tspan x="0" y="72">Духовного Возрождения. Это </tspan><tspan x="0" y="96">уникальное место в Лос-</tspan><tspan x="0" y="120">Анджелесе, где вы встретите </tspan><tspan x="0" y="144">дружелюбных людей всех </tspan><tspan x="0" y="168">возрастов из разных мест СНГ.</tspan><tspan x="0" y="192"></tspan><tspan x="0" y="216">У нас есть классы по изучению </tspan><tspan x="0" y="240">Библии для разных возрастов и </tspan><tspan x="0" y="264">для разных уровней знаний. </tspan><tspan x="0" y="288">Для самых маленьких </tspan><tspan x="0" y="312">проводятся интересные </tspan><tspan x="0" y="336">детские занятия.</tspan><tspan x="0" y="360"></tspan><tspan x="0" y="384">У Бога есть планы на людей, </tspan><tspan x="0" y="408">планы, которые дают людям </tspan><tspan x="0" y="432">надежду на будущее.</tspan><tspan x="0" y="456"></tspan><tspan x="0" y="480">Добро пожаловать!</tspan></text>
</svg>
