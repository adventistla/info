<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>О нас - Центр Духовного Возрождения</title>
    <style>
        /* Базовые сбросы */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: url('images/background.jpg') no-repeat center top;
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, sans-serif;
        }

        /* Главный контейнер 430px */
        .main-container {
            width: 430px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 200px;
        }

        /* Шапка */
        .header-top {
            width: 100%;
            line-height: 0;
            margin-bottom: 0; 
        }

        .header-top img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Кнопка Домой */
        .nav-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 0 40px;
            margin-top: -20px; 
            /* Отступ 40px от кнопки "Домой" (которая на границе) до текста */
            margin-bottom: 40px; 
            position: relative;
            z-index: 10;
        }

        .btn-home img {
            width: 145px;
            height: auto;
            display: block;
        }

        /* Контейнер для текста (уменьшен на 20%) */
        .content-image {
            width: 85%;
            /* Отступ 80px от текста до нижней кнопки */
            margin-bottom: 80px;
        }

        .content-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Кнопка снизу "Наш сайт" */
        .footer-nav {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .btn-site img {
            width: 220px;
            height: auto;
            display: block;
        }

        @media (max-width: 430px) {
            .main-container { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header class="header-top">
            <img src="images/header.svg" alt="Header">
        </header>

        <nav class="nav-bar">
            <a href="index.html" class="btn-home">
                <img src="images/home.svg" alt="Домой">
            </a>
        </nav>

        <main class="content-image">
            <img src="images/about-text.svg" alt="О нас">
        </main>

        <footer class="footer-nav">
            <a href="https://adventistla.org" class="btn-site" target="_blank">
                <img src="images/site.svg" alt="Наш сайт">
            </a>
        </footer>
    </div>
</body>
</html>
