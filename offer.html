<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предложение - ЦДВ</title>
    <style>
        /* Базовые сбросы */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: url('images/background.jpg') no-repeat center top;
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, sans-serif;
        }

        /* Главный контейнер 430px */
        .main-container {
            width: 430px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 200px;
        }

        /* Шапка */
        .header-top {
            width: 100%;
            line-height: 0;
            margin-bottom: 0; 
        }

        .header-top img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Кнопка Домой и отступ до текста */
        .nav-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 0 40px;
            margin-top: -20px; 
            
            /* ПАРАМЕТР 1: Отступ от кнопки "Домой" до ТЕКСТА */
            margin-bottom: 100px; 
            
            position: relative;
            z-index: 10;
        }

        .btn-home img {
            width: 145px;
            height: auto;
            display: block;
        }

        /* Текст предложения (offer.svg) */
        .offer-text {
            width: 90%; 
            
            /* ПАРАМЕТР 2: Отступ от ТЕКСТА до кнопки КОНТАКТ */
            margin-bottom: 120px; 
        }

        .offer-text img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Кнопка Контакт (contact.svg) */
        .contact-bar {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .btn-contact img {
            width: 250px; /* Можно регулировать размер кнопки здесь */
            height: auto;
            display: block;
        }

        @media (max-width: 430px) {
            .main-container { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Шапка -->
        <header class="header-top">
            <img src="images/header.svg" alt="Header">
        </header>

        <!-- Кнопка Домой -->
        <nav class="nav-bar">
            <a href="index.html" class="btn-home">
                <img src="images/home.svg" alt="Домой">
            </a>
        </nav>

        <!-- Текст предложения -->
        <main class="offer-text2">
            <img src="images/offer-text.svg" alt="Предложение">
        </main>

        <!-- Кнопка Связаться с нами -->
        <footer class="contact-bar">
            <a href="mailto:mail@adventistla.org" class="btn-contact">
                <img src="images/contact.svg" alt="Связаться с нами">
            </a>
        </footer>
    </div>
</body>
</html>
